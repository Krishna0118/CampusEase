<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <link rel="stylesheet" href="./registration_student_teacher.css">
</head>
<body>
    <div class="container">
        <h1>Registration Form</h1>
        <div class="role-selector">
            <button class="role-btn active" onclick="switchRole('student')">Student</button>
            <button class="role-btn" onclick="switchRole('faculty')">Faculty</button>
        </div>
        <form id="registrationForm">
            <!-- Common Fields -->
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="contact">Contact Number</label>
                <input type="tel" id="contact" required>
            </div>
            <!-- Student-specific fields -->
            <div id="studentFields">
                <div class="form-group">
                    <label for="enrollmentNumber">Enrollment Number</label>
                    <input type="text" id="enrollmentNumber">
                </div>
                <div class="form-group">
                    <label for="degree">Degree</label>
                    <select id="degree">
                        <option value="">Select Degree</option>
                        <option value="btech">B.Tech</option>
                        <option value="mtech">M.Tech</option>
                        <option value="phd">Ph.D</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="branch">Branch</label>
                    <select id="branch">
                        <option value="">Select Branch</option>
                        <option value="cse">Computer Science</option>
                        <option value="ece">Electronics</option>
                        <option value="me">Mechanical</option>
                        <option value="ce">Civil</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="semester">Semester</label>
                    <select id="semester">
                        <option value="">Select Semester</option>
                        <option value="1">1st Semester</option>
                        <option value="2">2nd Semester</option>
                        <option value="3">3rd Semester</option>
                        <option value="4">4th Semester</option>
                        <option value="5">5th Semester</option>
                        <option value="6">6th Semester</option>
                        <option value="7">7th Semester</option>
                        <option value="8">8th Semester</option>
                    </select>
                </div>
            </div>
            <!-- Faculty-specific fields -->
            <div id="facultyFields" class="hidden">
                <div class="form-group">
                    <label for="employeeId">Employee ID</label>
                    <input type="text" id="employeeId">
                </div>
                <div class="form-group">
                    <label for="department">Department</label>
                    <select id="department">
                        <option value="">Select Department</option>
                        <option value="cse">Computer Science</option>
                        <option value="ece">Electronics</option>
                        <option value="me">Mechanical</option>
                        <option value="ce">Civil</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="designation">Designation</label>
                    <select id="designation">
                        <option value="">Select Designation</option>
                        <option value="professor">Professor</option>
                        <option value="associate">Associate Professor</option>
                        <option value="assistant">Assistant Professor</option>
                        <option value="lecturer">Lecturer</option>
                    </select>
                </div>
            </div>
            <button type="submit" class="submit-btn">Register</button>
        </form>
    </div>
    <script>
        function switchRole(role) {
            const studentFields = document.getElementById('studentFields');
            const facultyFields = document.getElementById('facultyFields');
            const buttons = document.querySelectorAll('.role-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if (role === 'student') {
                studentFields.classList.remove('hidden');
                facultyFields.classList.add('hidden');
            } else {
                studentFields.classList.add('hidden');
                facultyFields.classList.remove('hidden');
            }
        }
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // Handle form submission here
            alert('Registration submitted successfully!');
        });
    </script>
</body>
</html>
